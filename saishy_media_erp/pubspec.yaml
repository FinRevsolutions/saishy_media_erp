name: saishy_media_erp
description: SAISHY Media ERP — Complete Media Agency Management System

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP / API
  dio: ^5.4.1

  # Local Database (Offline)
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.3

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Shared Prefs
  shared_preferences: ^2.2.3

  # Connectivity
  connectivity_plus: ^6.0.3

  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.13.0

  # File Operations
  file_picker: ^8.0.3
  image_picker: ^1.1.0
  open_file: ^3.3.2

  # Sharing (WhatsApp, etc.)
  share_plus: ^9.0.0

  # Animations
  flutter_animate: ^4.5.0

  # Charts
  fl_chart: ^0.68.0

  # UI Helpers
  intl: ^0.19.0
  uuid: ^4.4.0

  # Cached Network Images
  cached_network_image: ^3.3.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
